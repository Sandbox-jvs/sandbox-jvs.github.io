    <head>
        <title> Guess a Number </title>
        <meta charset="utf-8">
        <link href="css/style.css" rel="stylesheet"/>
    </head>
    <body>

        <header>
            <h1>Guess the Number!</h1>
            <h2>Guess a number between 1 and 99 in seven attempts!</h2>
        </header>
        <br>
        <div id="main">
          Enter a guess: 
          <!-- Creates a text box for user input -->
          <input type="text" id="playerGuess" size="10">         
          <button id="guessBtn"> Guess </button> <br>
          <button id="resetBtn"> Play Again! </button> 
          <div id="feedback"></div>
          <div> Previous Guesses:
                <span id="guesses"></span>
          </div>
          <div id="wins"></div>
          <div id="losses"></div>
        </div>
