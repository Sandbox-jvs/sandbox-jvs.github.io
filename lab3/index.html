<!DOCTYPE html>
<html>
<head>
   <meta charset="utf-8">
   <title> Sign Up Page </title>

   <link rel="stylesheet" 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
      <link rel="stylesheet" href="css/styles.css">
</head>

<body id="form-bg">
<div id="form-base" class="container p-5 fw-semibold bg-light">
   <h1 id="heading" class="text-center"> Sign Up Form</h1>

    <hr>
   <form id="signupForm" action="welcome.html">

   <label class="mb-3"> First Name:
      <input type="text" id="fName" name="fName"><br>
   </label>

   <label>Last Name:
      <input class="mb-3" type="text" id="lName" name="lName"><br>
   </label>
   <div class="mb-3">
      Gender:
      <label><input type="radio" name="gender" value="m"> Male</label>
      <label><input type="radio" name="gender" value="f"> Female</label><br>
   </div>
   <label class="mb-3">Zip Code:
      <input type="text" id="zip" name="zip"><br>
   </label>
   <div>
      City: <span id="city"></span><br>
      Latitude: <span id="latitude"></span><br>
      Longitude: <span id="longitude"></span><br>
   </div>

   <label id="state-label" class="mb-3 pt-5">State:
   <select id="state" name="state">
      <option value="">Loading states...</option>
   </select><br>
   </label>

   <label id="county-label"  class="mb-3 pb-5">Select a County:
      <select id="county" name="county"></select><br>
   </label>

   <label class="mb-3">Desired Username:
      <input type="text" id="username" name="username">
   </label>
   <span id="usernameError"></span><br>

   <label  class="mb-3">Password:
   <input type="password" id="password" name="password"><br>
   </label>
   <span id="passwordError"></span><br>

   <label class="mb-3">Type Password Again:
      <input type="password" id="passwordAgain" name="passwordAgain"><br>
   </label>
   <span id="confirmPasswordError"></span><br>

   <button id="submitBtn" class="btn btn-success btn-lg fw-bold">Sign up!</button>
   </form>
</div>
<script src="js/script.js"></script>
</body>
</html>
